<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Burning Man Art Collector</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f0f12;
      --surface: #1a1a22;
      --border: #2d2d3a;
      --text: #f2f2f7;
      --muted: #9b9bab;
      --accent: #ff6b2c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 2rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #1c1210 0%, var(--bg) 100%);
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
    }
    .subtitle { color: var(--muted); margin: 0; }
    .stats {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.875rem;
    }
    .stat strong { color: var(--accent); }
    .controls {
      padding: 1rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    input[type="search"] {
      flex: 1;
      min-width: 220px;
      padding: 0.6rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
    }
    main {
      padding: 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      background: #111;
    }
    .card .placeholder {
      height: 200px;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: #111;
      font-size: 0.875rem;
    }
    .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }
    .card h2 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.3;
    }
    .meta { color: var(--muted); font-size: 0.875rem; }
    .summary {
      font-size: 0.9rem;
      color: #d5d5e0;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card a {
      color: var(--accent);
      font-size: 0.875rem;
      text-decoration: none;
      margin-top: auto;
    }
    .card a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      background: #2a1f18;
      color: #ffb48a;
      border: 1px solid #4a3020;
    }
    .empty, .error, .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
    }
    .error { color: #ff8a8a; }
  </style>
</head>
<body>
  <header>
    <h1>Burning Man Art Collector</h1>
    <p class="subtitle">Scraped installation records from the Burning Man art archive</p>
    <div class="stats" id="stats"></div>
  </header>
  <div class="controls">
    <input type="search" id="search" placeholder="Search by title, artist, or location..." />
  </div>
  <main id="grid">
    <div class="loading">Loading records...</div>
  </main>
  <script>
    const DATA_URL = "../data/exports/burning_man/2022/consolidated/burning_man_2022_all_completed.json";

    function recordFromEntry(entry) {
      const mapped = entry.mapped_artelier_values || {};
      const original = entry.original_scraped_values || {};
      return {
        title: mapped.project_title || original.title || "Untitled",
        artist: mapped.contributor_name || original.artist_display_text || "Unknown artist",
        location: mapped.project_location || original.artist_location || "",
        year: mapped.project_year || original.year || "",
        type: mapped.project_type || original.installation_type || "",
        summary: mapped.project_summary || original.description || "",
        image: mapped.hero_image_url || original.primary_image_url || "",
        url: mapped.proof_external_url || original.canonical_source_url || "",
        needsReview: original.needs_manual_review,
      };
    }

    let allRecords = [];

    function render(records) {
      const grid = document.getElementById("grid");
      if (!records.length) {
        grid.innerHTML = '<div class="empty">No matching records.</div>';
        return;
      }
      grid.innerHTML = records.map((r) => `
        <article class="card">
          ${r.image
            ? `<img src="${r.image}" alt="${r.title}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'placeholder',textContent:'Image unavailable'}))" />`
            : '<div class="placeholder">No image</div>'}
          <div class="card-body">
            <h2>${r.title}</h2>
            <div class="meta">${r.artist}${r.location ? ` · ${r.location}` : ""}${r.year ? ` · ${r.year}` : ""}</div>
            ${r.type ? `<span class="badge">${r.type}</span>` : ""}
            ${r.needsReview ? '<span class="badge">Needs review</span>' : ""}
            <p class="summary">${r.summary || "No description available."}</p>
            ${r.url ? `<a href="${r.url}" target="_blank" rel="noopener">View on archive →</a>` : ""}
          </div>
        </article>
      `).join("");
    }

    function updateStats(records) {
      const artists = new Set(records.map((r) => r.artist)).size;
      document.getElementById("stats").innerHTML = `
        <div class="stat"><strong>${records.length}</strong> installations</div>
        <div class="stat"><strong>${artists}</strong> artists</div>
        <div class="stat">Source: <strong>2022 archive</strong></div>
      `;
    }

    document.getElementById("search").addEventListener("input", (e) => {
      const q = e.target.value.trim().toLowerCase();
      const filtered = !q ? allRecords : allRecords.filter((r) =>
        [r.title, r.artist, r.location, r.summary, r.type].join(" ").toLowerCase().includes(q)
      );
      render(filtered);
    });

    fetch(DATA_URL)
      .then((res) => {
        if (!res.ok) throw new Error(`Failed to load data (${res.status})`);
        return res.json();
      })
      .then((data) => {
        allRecords = data.map(recordFromEntry);
        updateStats(allRecords);
        render(allRecords);
      })
      .catch((err) => {
        document.getElementById("grid").innerHTML = `<div class="error">${err.message}</div>`;
      });
  </script>
</body>
</html>
